receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  otlphttp/tempo:
    endpoint: http://tempo:4318

  prometheus:
    endpoint: 0.0.0.0:9464

  debug:
    verbosity: normal

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]